/**
 * Order status timeline component for FreshCart.
 *
 * Displays the step-by-step progress of an order through its lifecycle.
 * Highlights the current step and shows timestamps for completed steps.
 */

import { FiCheck, FiClock, FiPackage, FiTruck, FiHome, FiX } from "react-icons/fi";
import { formatDate, getOrderStatusDisplay } from "../../utils/formatters";

const ORDER_STEPS = [
  {
    status: "pending",
    label: "Order Placed",
    icon: FiClock,
    timestampField: "created_at",
  },
  {
    status: "confirmed",
    label: "Confirmed",
    icon: FiCheck,
    timestampField: "confirmed_at",
  },
  {
    status: "preparing",
    label: "Preparing",
    icon: FiPackage,
    timestampField: null,
  },
  {
    status: "ready",
    label: "Ready",
    icon: FiPackage,
    timestampField: "prepared_at",
  },
  {
    status: "picked_up",
    label: "Picked Up",
    icon: FiTruck,
    timestampField: "picked_up_at",
  },
  {
    status: "en_route",
    label: "On the Way",
    icon: FiTruck,
    timestampField: null,
  },
  {
    status: "delivered",
    label: "Delivered",
    icon: FiHome,
    timestampField: "delivered_at",
  },
];

const STATUS_ORDER = ORDER_STEPS.map((s) => s.status);

export default function OrderStatusTimeline({ order }) {
  if (!order) return null;

  const isCancelled = order.status === "cancelled";
  const isRefunded = order.status === "refunded";
  const currentStepIndex = STATUS_ORDER.indexOf(order.status);

  if (isCancelled || isRefunded) {
    return (
      <div className="bg-white rounded-xl border border-gray-100 p-6">
        <h3 className="text-lg font-semibold text-gray-800 mb-4">
          Order Status
        </h3>
        <div className="flex items-center gap-3 p-4 bg-red-50 rounded-lg">
          <div className="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center">
            <FiX className="w-5 h-5 text-red-600" />
          </div>
          <div>
            <p className="font-medium text-red-700">
              {isCancelled ? "Order Cancelled" : "Order Refunded"}
            </p>
            {order.cancellation_reason && (
              <p className="text-sm text-red-600 mt-1">
                Reason: {order.cancellation_reason}
              </p>
            )}
            {order.cancelled_at && (
              <p className="text-xs text-red-400 mt-1">
                {formatDate(order.cancelled_at)}
              </p>
            )}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="bg-white rounded-xl border border-gray-100 p-6">
      <h3 className="text-lg font-semibold text-gray-800 mb-6">
        Order Progress
      </h3>

      <div className="space-y-0">
        {ORDER_STEPS.map((step, index) => {
          const isCompleted = index < currentStepIndex;
          const isCurrent = index === currentStepIndex;
          const isFuture = index > currentStepIndex;
          const Icon = step.icon;

          const timestamp = step.timestampField
            ? order[step.timestampField]
            : null;

          return (
            <div key={step.status} className="flex items-start">
              {/* Connector and icon */}
              <div className="flex flex-col items-center mr-4">
                <div
                  className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${
                    isCompleted
                      ? "bg-green-600 text-white"
                      : isCurrent
                        ? "bg-green-100 text-green-600 ring-2 ring-green-600"
                        : "bg-gray-100 text-gray-400"
                  }`}
                >
                  {isCompleted ? (
                    <FiCheck className="w-4 h-4" />
                  ) : (
                    <Icon className="w-4 h-4" />
                  )}
                </div>

                {/* Connector line */}
                {index < ORDER_STEPS.length - 1 && (
                  <div
                    className={`w-0.5 h-8 ${
                      isCompleted ? "bg-green-600" : "bg-gray-200"
                    }`}
                  />
                )}
              </div>

              {/* Step content */}
              <div className="pb-6 flex-1">
                <p
                  className={`text-sm font-medium ${
                    isCurrent
                      ? "text-green-700"
                      : isCompleted
                        ? "text-gray-800"
                        : "text-gray-400"
                  }`}
                >
                  {step.label}
                  {isCurrent && (
                    <span className="ml-2 text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">
                      Current
                    </span>
                  )}
                </p>
                {timestamp && (
                  <p className="text-xs text-gray-400 mt-0.5">
                    {formatDate(timestamp)}
                  </p>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Estimated delivery */}
      {order.estimated_delivery_time && currentStepIndex < 6 && (
        <div className="mt-4 pt-4 border-t border-gray-100">
          <p className="text-sm text-gray-500">
            Estimated delivery:{" "}
            <span className="font-medium text-gray-700">
              {formatDate(order.estimated_delivery_time)}
            </span>
          </p>
        </div>
      )}
    </div>
  );
}
